function getMitraTglTandaTangan(m){return m.tglTandaTangan||S.set.tglTandaTangan||''}

/* ===== PERUBAHAN 1: getNextSeq sekarang mencari gap ===== */
function getNextSeq(tglTT,excludeId){
  if(!tglTT)return 1;
  const existing=S.mitra.filter(m=>{
    if(excludeId&&m.id===excludeId)return false;
    return getMitraTglTandaTangan(m)===tglTT&&m.nomorKontrak;
  });
  const usedSeqs=new Set();
  existing.forEach(m=>{
    const parts=m.nomorKontrak.split('/');
    if(parts.length===4){
      const seq=parseInt(parts[0].substring(4));
      if(seq>0)usedSeqs.add(seq);
    }
  });
  let seq=1;
  while(usedSeqs.has(seq))seq++;
  return seq;
}

function getNomorPreview(formTT,excludeId){
  const tglTT=formTT||S.set.tglTandaTangan||'';
  if(!tglTT)return{nomor:'-',isDup:false,conflictWith:''};
  const d=new Date(tglTT),dd=pad2(d.getDate()),mm=pad2(d.getMonth()+1),yyyy=d.getFullYear();
  const seq=getNextSeq(tglTT,excludeId);
  const nomor=dd+mm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+yyyy;
  const conflict=S.mitra.find(m=>m.id!==excludeId&&m.nomorKontrak===nomor);
  return{nomor,isDup:!!conflict,conflictWith:conflict?conflict.nama:''};
}

/* ===== PERUBAHAN 2: regenAllNomor hanya mengisi yang KOSONG ===== */
function regenAllNomor(){
  const groups={};
  S.mitra.forEach(m=>{
    const ttd=getMitraTglTandaTangan(m);
    if(!ttd)return;
    const d=new Date(ttd);
    const key=pad2(d.getDate())+pad2(d.getMonth()+1)+d.getFullYear();
    if(!groups[key])groups[key]={ddmm:key.substring(0,4),yyyy:key.substring(4),items:[]};
    groups[key].items.push(m);
  });
  Object.values(groups).forEach(g=>{
    g.items.sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
    const usedNums=new Set();
    g.items.forEach(m=>{
      if(m.nomorKontrak){
        const parts=m.nomorKontrak.split('/');
        if(parts.length===4&&parts[0].startsWith(g.ddmm)){
          const seq=parseInt(parts[0].substring(4));
          if(seq>0)usedNums.add(seq);
        }
      }
    });
    /* Hanya isi nomor untuk yang BELUM punya nomor */
    g.items.forEach(m=>{
      if(!m.nomorKontrak||m.nomorKontrak.trim()===''){
        let seq=1;
        while(usedNums.has(seq))seq++;
        m.nomorKontrak=g.ddmm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+g.yyyy;
        usedNums.add(seq);
      }
    });
  });
}

/* ===== PERUBAHAN 3: fixDuplicates hanya mengubah yang benar-benar duplikat ===== */
function fixDuplicates(){
  const used=new Set();
  const sorted=[...S.mitra].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
  sorted.forEach(m=>{
    if(!m.nomorKontrak)return;
    if(used.has(m.nomorKontrak)){
      const ttd=getMitraTglTandaTangan(m);
      if(!ttd)return;
      const d=new Date(ttd);
      const ddmm=pad2(d.getDate())+pad2(d.getMonth());
      const yyyy=d.getFullYear();
      let seq=1;
      let newNomor;
      do{
        newNomor=ddmm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+yyyy;
        seq++;
      }while(used.has(newNomor));
      m.nomorKontrak=newNomor;
    }
    used.add(m.nomorKontrak);
  });
}

function findDuplicates(){
  const map=new Map();
  const dups=[];
  S.mitra.forEach(m=>{
    if(!m.nomorKontrak)return;
    if(map.has(m.nomorKontrak)){dups.push({nomor:m.nomorKontrak,existing:map.get(m.nomorKontrak),duplicate:m})}
    else map.set(m.nomorKontrak,m);
  });
  return dups;
}

function updMitraList(){const el=$('mitraListWrap');if(!el)return;const dupSet=new Set(findDuplicates().map(d=>d.nomor));let list=[...S.mitra];if(mFilterBulan>=0)list=list.filter(m=>getMitraBulanTahun(m).bulan===mFilterBulan);if(mFilterTahun>0)list=list.filter(m=>getMitraBulanTahun(m).tahun===mFilterTahun);if(mFilter==='lengkap')list=list.filter(m=>m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='belum')list=list.filter(m=>!m.lampiran||!m.lampiran.length||!m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='custom')list=list.filter(m=>m.tglTandaTangan);if(mSearch){const q=mSearch.toLowerCase();list=list.filter(m=>m.nama.toLowerCase().includes(q)||m.nik.includes(q)||m.nomorKontrak.toLowerCase().includes(q))}list.sort((a,b)=>(b.nomorKontrak||'').localeCompare(a.nomorKontrak||''));const totalFiltered=list.length;if(!totalFiltered){el.innerHTML='<div class="px-6 py-16 text-center text-gray-400"><i class="fas fa-inbox text-3xl mb-3 block"></i>'+(mSearch||mFilter!=='all'||(mFilterBulan>=0||mFilterTahun>0)?'Tidak ada mitra yang cocok dengan filter':'Belum ada kontrak.')+'</div>';return}const start=(mP-1)*mPS,end=Math.min(mP*mPS,totalFiltered),pageItems=list.slice(start,end);el.innerHTML='<div class="tbl-scroll"><table class="w-full ctbl"><thead><tr class="text-center"><th class="w-7">No</th><th style="width:190px">Nomor Kontrak</th><th>Nama</th><th class="text-center">Bulan</th><th class="text-center">Tgl TTD</th><th class="text-center hidden lg:table-cell">Tgl Selesai</th><th class="text-center">Status</th><th class="text-center">Honor<br><span class="text-[9px] font-normal block mt-0.5">(Rp.)</span></th><th class="text-center w-28">Aksi</th></tr></thead><tbody>'+pageItems.map((m,i)=>{const hasLamp=m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0);const isDup=dupSet.has(m.nomorKontrak);return'<tr class="tbl-row border-b border-cool-100 last:border-0 '+(isDup?'bg-red-50/50':'')+'"><td class="text-[11px]">'+(s /* ===== PERUBAHAN 5: updTglPreview tidak mengubah nomor saat edit ===== */
function updTglPreview(){
  /* Saat edit, nomor terkunci — tidak perlu update preview nomor */
  if(_editId){
    const m=S.mitra.find(x=>x.id===_editId);
    if(m&&m.nomorKontrak){
      const nkEl=$('fNKPreview'),nkText=$('fNKText');
      if(nkText)nkText.textContent=m.nomorKontrak;
      if(nkEl&&!nkEl.classList.contains('locked')){
        nkEl.classList.add('locked');
        const labelEl=nkEl.querySelector('.nk-label');
        if(labelEl)labelEl.innerHTML='<i class="fas fa-lock" style="font-size:8px;margin-right:2px"></i>Nomor Kontrak (Tetap)';
        const iconEl=nkEl.querySelector('i:last-child');
        if(iconEl){iconEl.className='fas fa-lock';iconEl.style.color='#64748b'}
      }
      const dupWarn=$('fNKDupWarn');
      if(dupWarn)dupWarn.style.display='none';
      updTglChipsOnly();
      return;
    }
  }
  const fTT=$('fTT')?.value||'',fTS=$('fTS')?.value||'';
  const preview=getNomorPreview(fTT,_editId);
  const nkEl=$('fNKPreview'),nkText=$('fNKText'),dupWarn=$('fNKDupWarn');
  if(nkText)nkText.textContent=preview.nomor;
  if(nkEl){if(preview.isDup){nkEl.className='nk-compact dup-warn';if(nkEl.id)nkEl.id='fNKPreview';const iconEl=nkEl.querySelector('i:last-child');if(iconEl){iconEl.className='fas fa-exclamation-triangle';iconEl.style.color=''}const labelEl=nkEl.querySelector('.nk-label');if(labelEl)labelEl.innerHTML='Nomor Kontrak'}else{nkEl.className='nk-compact';if(nkEl.id)nkEl.id='fNKPreview';const iconEl=nkEl.querySelector('i:last-child');if(iconEl){iconEl.className='fas fa-check-circle';iconEl.style.color=''}const labelEl=nkEl.querySelector('.nk-label');if(labelEl)labelEl.innerHTML='Nomor Kontrak'}}
  if(dupWarn){if(preview.isDup){dupWarn.style.display='block';dupWarn.innerHTML='<div class="dup-warn-bar"><i class="fas fa-exclamation-triangle"></i><span><b>Duplikat!</b> Nomor ini sudah dipakai oleh <b>'+esc(preview.conflictWith)+'</b>.</span></div>'}else{dupWarn.style.display='none'}}
  updTglChipsOnly();
}

/* Fungsi helper untuk update hanya chip tanggal, bukan nomor */

  +'<span class="tgl-chip '+(isCustomBulan?'from-custom':'from-global')+'"><i class="fas '+(isCustomBulan?'fa-user':'fa-globe')+'" style="font-size:8px"></i>'+bulanNm+' '+tahunStr+'</span>'
  +'<span style="font-size:10px;color:#cbd5e1">|</span>'
  +'<span style="font-size:10.5px;color:#475569"><i class="fas fa-calendar-day" style="font-size:9px;color:#94a3b8;margin-right:3px"></i>'+hariT+'</span>'

  +'<span style="font-size:10px;color:#cbd5e1">|</span>'

  +(!isCustomBulan&&!fTS?'<span class="snap-badge" style="margin-left:2px"><i class="fas fa-camera"></i>Akan di-snapshot</span>':'<span class="snap-badge" style="margin-left:2px;background:#fef3c7;border-color:#fde68a;color:#92400e"><i class="fas fa-lock"></i>Custom</span>')
  +'</div>';
}

/* ===== PERUBAHAN 6: saveMitra — edit pertahankan nomor, add hitung eksplisit ===== */
function saveMitra(editId){
  const selVal=$('fNmSelect').value;let nama='';
  if(selVal==='__manual__'){nama=$('fNmManual').value.trim()}
  else if(selVal){const d=S.dbMitra.find(x=>x.id===selVal);nama=d?d.nama:''}
  if(!nama)return toast('Nama wajib diisi','warning');
  const nik=$('fNik').value.trim(),alamat=$('fAl').value.trim();
  if(!nik||nik.length<10)return toast('NIK tidak valid','warning');
  if(!alamat)return toast('Alamat wajib diisi','warning');
  const tl=$('fTlp').value.trim();
  const tglTT=$('fTT').value.trim(),tglSelesai=$('fTS').value.trim();
  const snapTT=tglTT||S.set.tglTandaTangan||'';
  let snapTS=tglSelesai;
  if(!snapTS){if(S.set.tglSelesai)snapTS=S.set.tglSelesai;else if(snapTT)snapTS=calcSelesaiFromTTD(snapTT);else snapTS=getAutoDates().selesai}
  const lampRows=$('lampBody').children;const lamp=[];
  for(const r of lampRows){const sel=r.querySelector('.lj'),mi=r.querySelector('.lj-manual');let jenis='';if(sel.value==='__manual__')jenis=mi?mi.value.trim():'';else jenis=sel.value.trim();lamp.push({jenis,jumlah:Number(r.querySelector('.lr').value)||0,nilaiPerRD:Number(r.querySelector('.ln').value)||0})}
  const totalHonor=lamp.reduce((s,l)=>s+l.jumlah*l.nilaiPerRD,0);
  if(totalHonor>S.set.honorMaks)return toast('Total honor melebihi batas maksimal','warning');

  if(editId){
    /* ===== EDIT: Pertahankan nomor kontrak yang sudah ada ===== */
    const idx=S.mitra.findIndex(x=>x.id===editId);
    if(idx>-1){
      const existing=S.mitra[idx];
      S.mitra[idx]={
        ...existing,
        nama,nik,alamat,noTelepon:tl,
        tglTandaTangan:snapTT,tglSelesai:snapTS,
        lampiran:lamp,totalHonor,
        updatedAt:new Date().toISOString()
      };
    }
    toast('Data mitra diperbarui (nomor kontrak tetap: '+S.mitra.find(x=>x.id===editId)?.nomorKontrak+')');
  } else {
    /* ===== TAMBAH: Hitung nomor baru secara eksplisit ===== */
    const preview=getNomorPreview(snapTT,'');
    if(preview.isDup){toast('Duplikat! Nomor '+preview.nomor+' sudah dipakai oleh "'+preview.conflictWith+'".','error');return}
    const newMitra={
      id:gid(),
      nomorKontrak:preview.nomor,
      nama,nik,alamat,noTelepon:tl,
      tglTandaTangan:snapTT,tglSelesai:snapTS,
      lampiran:lamp,totalHonor,
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString()
    };
    S.mitra.push(newMitra);
    toast('Mitra berhasil ditambahkan dengan nomor '+preview.nomor);
  }
  aSave();cM();render();
}

function saveSettings(){
  const ppkNama=$('sPpkNm').value.trim(),ppkNip=$('sPpkNip').value.trim(),bpsNama=$('sBpsNm').value.trim(),bpsAlamat=$('sBpsAl').value.trim(),kota=$('sKota').value.trim(),honorMaks=Number($('sHonor').value)||0;

/* ===== RENDER ===== */
function render(){
  updBadges();
  const mc=$('mc');
  if(!mc)return;
  switch(S.v){
    case 'dashboard':mc.innerHTML=rDash();break;
    case 'dbmitra':mc.innerHTML=rDbMitra();setTimeout(()=>updDbList(),0);break;
    case 'kegiatan':mc.innerHTML=rKegiatan();setTimeout(()=>updKegList(),0);break;
    case 'mitra':mc.innerHTML=rMitra();setTimeout(()=>updMitraList(),0);break;
    case 'settings':mc.innerHTML=rSettings();break;
    case 'exim':mc.innerHTML=rExIm();break;
    default:mc.innerHTML=rDash();
  }
  mc.scrollTop=0;
  window.scrollTo({top:0,behavior:'auto'});
}
