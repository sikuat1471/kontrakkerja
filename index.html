<script>
const VNAMES={dashboard:'Dashboard',dbmitra:'Database Mitra',kegiatan:'Jenis Kegiatan',mitra:'Mitra Statistik',settings:'Pengaturan',exim:'Export / Import'};
const VNAMES_ICONS={dashboard:'fa-chart-pie',dbmitra:'fa-address-book',kegiatan:'fa-clipboard-list',mitra:'fa-file-contract',settings:'fa-cog',exim:'fa-file-export'};
const BL=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const HR=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const S={v:'dashboard',set:{ppkNama:'',ppkNip:'',bpsNama:'Badan Pusat Statistik Kota Pekanbaru',bpsAlamat:'Jl. Rawa Indah No. 2',kota:'Pekanbaru',honorMaks:1050000,bulan:0,tahun:2025,tglTandaTangan:'2025-01-02',tglSelesai:''},mitra:[],dbMitra:[],jenisKegiatan:[],lastSaved:null};
const $=id=>document.getElementById(id);
const gid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fRp(n){if(!n&&n!==0)return'-';return'Rp '+Number(n).toLocaleString('id-ID')}
function fTgl(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}
function fTglShort(d){if(!d)return'-';return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function lastDay(m,y){return new Date(y,m+1,0).getDate()}
function pad2(n){return String(n).padStart(2,'0')}
function fmtD(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function updBadges(){const b1=$('bdgDb'),b2=$('bdgKeg'),b3=$('bdgKon');if(S.dbMitra.length){b1.textContent=S.dbMitra.length;b1.classList.remove('hidden')}else b1.classList.add('hidden');if(S.jenisKegiatan.length){b2.textContent=S.jenisKegiatan.length;b2.classList.remove('hidden')}else b2.classList.add('hidden');if(S.mitra.length){b3.textContent=S.mitra.length;b3.classList.remove('hidden')}else b3.classList.add('hidden')}

function getMitraTglTandaTangan(m){return m.tglTandaTangan||S.set.tglTandaTangan||''}
function getNextSeq(tglTT,excludeId){if(!tglTT)return 1;return S.mitra.filter(m=>{if(excludeId&&m.id===excludeId)return false;return getMitraTglTandaTangan(m)===tglTT}).length+1}
function getNomorPreview(formTT,excludeId){const tglTT=formTT||S.set.tglTandaTangan||'';if(!tglTT)return'-';const d=new Date(tglTT),dd=pad2(d.getDate()),mm=pad2(d.getMonth()+1),yyyy=new Date().getFullYear(),seq=getNextSeq(tglTT,excludeId);return dd+mm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+yyyy}
function regenAllNomor(){const yyyy=new Date().getFullYear(),groups={};S.mitra.forEach(m=>{const ttd=getMitraTglTandaTangan(m);if(!groups[ttd])groups[ttd]=[];groups[ttd].push(m)});Object.keys(groups).forEach(ttd=>{const d=new Date(ttd),dd=pad2(d.getDate()),mm=pad2(d.getMonth()+1);groups[ttd].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0)).forEach((m,i)=>{m.nomorKontrak=dd+mm+String(i+1).padStart(3,'0')+'/PPK/SPKM/'+yyyy})})}

function getAutoDates(){const m=S.set.bulan,y=S.set.tahun,ld=lastDay(m,y);let nm=m+1,ny=y;if(nm>11){nm=0;ny++}return{selesai:`${ny}-${pad2(nm+1)}-${ld}`,serah:`${ny}-${pad2(nm+1)}-05`,serahExt:`${ny}-${pad2(nm+1)}-10`}}
function getMitraTglSelesai(m){return m.tglSelesai||S.set.tglSelesai||getAutoDates().selesai}
function getMitraBulanTahun(m){const tglTT=getMitraTglTandaTangan(m);if(tglTT){const d=new Date(tglTT);return{bulan:d.getMonth(),tahun:d.getFullYear()}}return{bulan:S.set.bulan,tahun:S.set.tahun}}
function getMitraDates(m){const tglSelesai=getMitraTglSelesai(m),endD=new Date(tglSelesai),serah=new Date(endD),serahExt=new Date(endD);serah.setDate(serah.getDate()+5);serahExt.setDate(serahExt.getDate()+10);return{selesai:tglSelesai,serah:fmtD(serah),serExt:fmtD(serahExt)}}

function terbilang(n){if(n===0)return'nol';const s=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan'],b=['','ribu','juta','miliar','triliun'],bl=['sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas'];let r='',neg=false;if(n<0){neg=true;n=-n}n=Math.floor(n);let i=0;while(n>0){let c=n%1000;n=Math.floor(n/1000);let cs='',cO=c;if(c>=100){cs+=s[Math.floor(c/100)]+' ratus ';c%=100}if(c>=11&&c<=19)cs+=bl[c-11]+' ';else if(c===10)cs+='sepuluh ';else if(c>=20){cs+=s[Math.floor(c/10)]+' puluh ';c%=10;if(c>0)cs+=s[c]+' '}else if(c>0)cs+=s[c]+' ';if(cO===1&&i===1&&n===0)cs='seribu ';else if(cO>0)cs+=b[i]+' ';r=cs+r;i++}return(neg?'minus ':'')+r.trim()}

function pagHTML(cp,total,ps,pv,uf){
  const tp=Math.ceil(total/ps);if(total===0)return'';

  h+=`<button class="pag-btn bg-cool-100 text-gray-500" onclick="${pv}P=${cp-1};${uf}()" ${cp<=1?'disabled':''}><i class="fas fa-angle-left" style="font-size:9px"></i></button>`;
  let sp=Math.max(1,cp-2),ep=Math.min(tp,sp+4);if(ep-sp<4)sp=Math.max(1,ep-4);

  if(ep<tp)h+=`<span class="pag-dots">…</span>`;

}

en-600':'text-slate-500'} font-medium">${m.aktif!==false?'Aktif':'Nonaktif'}</span></div></div></div></div><div class="flex flex-col sm:flex-row justify-between gap-3 pt-2 border-t border-cool-200"><button onclick="cM()" class="btn-g px-5 py-2.5 rounded-xl text-sm font-medium">Batal</button><button onclick="saveDbMitra('${editId||''}')" class="btn-p px-6 py-2.5 rounded-xl text-sm font-semibold"><i class="fas fa-save mr-2"></i>${isEdit?'Simpan Perubahan':'Simpan Mitra'}</button></div></div>`;oM((isEdit?'Edit':'Tambah')+' Database Mitra',html,false,'')}

function saveDbMitra(editId){const nama=$('fDbNm').value.trim(),nik=$('fDbNik').value.trim(),hp=$('fDbHp').value.trim(),alamat=$('fDbAl').value.trim(),aktif=$('fDbAktif').checked;if(!nama)return toast('Nama wajib diisi','warning');if(!nik||nik.length<10)return toast('NIK tidak valid (min 10 digit)','warning');if(!alamat)return toast('Alamat wajib diisi','warning');if(editId){const idx=S.dbMitra.findIndex(x=>x.id===editId);if(idx>-1)S.dbMitra[idx]={...S.dbMitra[idx],nama,nik,noHp:hp,alamat,aktif,updatedAt:new Date().toISOString()};toast('Data mitra diperbarui')}else{S.dbMitra.push({id:gid(),nama,nik,noHp:hp,alamat,aktif,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});toast('Mitra berhasil ditambahkan')}aSave();cM();render()}

function delDb(id){const m=S.dbMitra.find(x=>x.id===id);if(!m)return;oCf('Hapus Database Mitra',`"${m.nama}" (${m.nik}) akan dihapus dari database.`,()=>{S.dbMitra=S.dbMitra.filter(x=>x.id!==id);aSave();render();toast('Database mitra berhasil dihapus')})}

function oMFormKeg(editId){const k=editId?S.jenisKegiatan.find(x=>x.id===editId):{id:'',nama:'',nilai:0};if(!k&&editId)return toast('Data tidak ditemukan','error');const isEdit=!!editId;const html=`<div class="fade-in max-w-lg mx-auto space-y-5"><div class="bg-cool-50 rounded-xl p-5 space-y-4"><h4 class="font-semibold text-sm text-gold-700 flex items-center gap-2"><i class="fas fa-clipboard-list"></i> ${isEdit?'Edit':'Tambah'} Jenis Kegiatan</h4><div><label class="block text-xs font-medium text-gray-500 mb-1">Nama Jenis Kegiatan <span class="text-red-400">*</span></label><input id="fKegNm" type="text" value="${esc(k.nama)}" placeholder="Contoh: Sensus Ekonomi 2026" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Nilai per RD (Rupiah) <span class="text-red-400">*</span></label><input id="fKegNilai" type="number" value="${k.nilai||''}" min="0" placeholder="Contoh: 50000" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm font-mono"></div></div><div class="flex flex-col sm:flex-row justify-between gap-3 pt-2 border-t border-cool-200"><button onclick="cM()" class="btn-g px-5 py-2.5 rounded-xl text-sm font-medium">Batal</button><button onclick="saveKegiatan('${editId||''}')" class="btn-p px-6 py-2.5 rounded-xl text-sm font-semibold"><i class="fas fa-save mr-2"></i>${isEdit?'Simpan Perubahan':'Simpan Kegiatan'}</button></div></div>`;oM((isEdit?'Edit':'Tambah')+' Jenis Kegiatan',html,false,'')}

/* ===== MITRA STATISTIK ===== */
let mSearch='',mFilter='all',mFilterBulan=-1,mFilterTahun=0;
function getAvailableYears(){const ys=new Set();ys.add(S.set.tahun);ys.add(new Date().getFullYear());S.mitra.forEach(m=>{const bt=getMitraBulanTahun(m);ys.add(bt.tahun)});return[...ys].sort((a,b)=>b-a)}

function rMitra(){
  const availYears=getAvailableYears();
  let yearOpts=`<option value="0"${mFilterTahun===0?' selected':''}>Semua Tahun</option>`;availYears.forEach(y=>{yearOpts+=`<option value="${y}"${mFilterTahun===y?' selected':''}>${y}</option>`});
  let monthOpts=`<option value="-1"${mFilterBulan===-1?' selected':''}>Semua Bulan</option>`;BL.forEach((b,i)=>{monthOpts+=`<option value="${i}"${mFilterBulan===i?' selected':''}>${b}</option>`});
  const hasActiveBT=mFilterBulan>=0||mFilterTahun>0;
  return`<div class="fade-in"><div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5"><div><h2 class="text-2xl font-bold">Mitra Statistik</h2><p class="text-gray-500 text-sm mt-1">${S.mitra.length} kontrak · Format: <span class="font-mono text-xs">DDMMNNN/PPK/SPKM/${new Date().getFullYear()}</span></p></div><div class="flex gap-2 flex-wrap"><button onclick="addSingle()" class="btn-p px-5 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap"><i class="fas fa-plus mr-2"></i>Tambah Kontrak</button>${S.mitra.length?`<button onclick="printAll()" class="btn-print px-5 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap"><i class="fas fa-print mr-2"></i>Cetak Semua</button>`:''}</div></div><div class="bg-white rounded-2xl border border-cool-200 shadow-sm"><div class="px-4 py-2 border-b border-cool-200 space-y-2"><div class="flex flex-col sm:flex-row gap-2"><div class="relative flex-1"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i><input id="mitraSearchInp" type="text" placeholder="Cari nama, NIK, nomor kontrak..." value="${esc(mSearch)}" oninput="mSearch=this.value;mP=1;updMitraList()" class="w-full pl-8 pr-3 py-2 rounded-lg border border-cool-200 text-sm"></div><div class="flex gap-2 flex-shrink-0"><div class="relative"><select onchange="mFilterBulan=Number(this.value);mP=1;updMitraList()" class="pl-3 pr-7 py-2 rounded-lg border ${mFilterBulan>=0?'flt-active':'border-cool-200'} text-sm appearance-none cursor-pointer bg-white" style="min-width:130px">${monthOpts}</select><i class="fas fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i></div><div class="relative"><select onchange="mFilterTahun=Number(this.value);mP=1;updMitraList()" class="pl-3 pr-7 py-2 rounded-lg border ${mFilterTahun>0?'flt-active':'border-cool-200'} text-sm appearance-none cursor-pointer bg-white" style="min-width:110px">${yearOpts}</select><i class="fas fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i></div>${hasActiveBT?`<button onclick="mFilterBulan=-1;mFilterTahun=0;mP=1;updMitraList()" class="px-2.5 py-2 rounded-lg text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 transition flex items-center gap-1 whitespace-nowrap"><i class="fas fa-times"></i>Reset</button>`:''}</div></div><div class="flex gap-1.5 flex-wrap items-center"><span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider mr-0.5">Status:</span>${['all','lengkap','belum','custom'].map(f=>{const lb={all:'Semua',lengkap:'Lengkap',belum:'Belum',custom:'Tgl Custom'};return`<button onclick="mFilter='${f}';mP=1;updMitraList()" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition ${mFilter===f?'bg-navy-900 text-white':'bg-cool-100 text-gray-600 hover:bg-cool-200'}">${lb[f]}</button>`}).join('')}${hasActiveBT?`<span class="ml-auto text-[11px] text-gold-700 bg-amber-50 px-2 py-1 rounded-md font-medium"><i class="fas fa-filter mr-1"></i>${mFilterBulan>=0?BL[mFilterBulan]+' ':''}${mFilterTahun>0?mFilterTahun:''}</span>`:''}</div></div><div id="mitraListWrap"></div></div></div>`}

function updMitraList(){const el=$('mitraListWrap');if(!el)return;let list=[...S.mitra];if(mFilterBulan>=0)list=list.filter(m=>getMitraBulanTahun(m).bulan===mFilterBulan);if(mFilterTahun>0)list=list.filter(m=>getMitraBulanTahun(m).tahun===mFilterTahun);if(mFilter==='lengkap')list=list.filter(m=>m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='belum')list=list.filter(m=>!m.lampiran||!m.lampiran.length||!m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='custom')list=list.filter(m=>m.tglTandaTangan||m.tglSelesai);if(mSearch){const q=mSearch.toLowerCase();list=list.filter(m=>m.nama.toLowerCase().includes(q)||m.nik.includes(q)||m.nomorKontrak.toLowerCase().includes(q))}list.sort((a,b)=>(a.nomorKontrak||'').localeCompare(b.nomorKontrak||''));const hasActiveBT=mFilterBulan>=0||mFilterTahun>0;const totalFiltered=list.length;
  if(!totalFiltered){el.innerHTML=`<div class="px-6 py-16 text-center text-gray-400"><i class="fas fa-inbox text-3xl mb-3 block"></i>${mSearch||mFilter!=='all'||hasActiveBT?'Tidak ada mitra yang cocok dengan filter':'Belum ada kontrak.'}</div>`;return}
  const start=(mP-1)*mPS,end=Math.min(mP*mPS,totalFiltered),pageItems=list.slice(start,end);
  el.innerHTML=`<div class="tbl-scroll"><table class="w-full ctbl"><thead><tr class="text-left text-gray-500"><th class="w-7">No</th><th>Nomor Kontrak</th><th>Nama</th><th>Bulan</th><th>Tgl TTD</th><th class="hidden lg:table-cell">Tgl Selesai</th><th>Status</th><th class="text-right">Honor</th><th class="text-right w-28">Aksi</th></tr></thead><tbody>${pageItems.map((m,i)=>{const hasLamp=m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0);return`<tr class="tbl-row border-b border-cool-100 last:border-0"><td class="text-gray-400 text-[11px]">${start+i+1}</td><td class="font-mono text-[11px] font-semibold text-navy-800">${esc(m.nomorKontrak)}</td><td class="font-medium">${esc(m.nama)}</td><td>${bulanBadge(m)}</td><td>${tglBadge(m,'tglTandaTangan')}</td><td class="hidden lg:table-cell">${tglBadge(m,'tglSelesai')}</td><td>${hasLamp?'<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-green-50 text-green-700">Lengkap</span>':'<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-amber-50 text-amber-700">Belum</span>'}</td><td class="font-mono text-[11px] text-right">${fRp(m.totalHonor||0)}</td><td class="text-right whitespace-nowrap"><button onclick="viewM('${m.id}')" class="text-blue-600 hover:text-blue-700 text-xs font-medium mr-1" title="Lihat"><i class="fas fa-eye"></i></button><button onclick="editM('${m.id}')" class="text-amber-600 hover:text-amber-700 text-xs font-medium mr-1" title="Edit"><i class="fas fa-pen"></i></button><button onclick="printK('${m.id}')" class="text-blue-500 hover:text-blue-600 text-xs font-medium mr-1" title="Cetak"><i class="fas fa-print"></i></button><button onclick="delM('${m.id}')" class="text-red-500 hover:text-red-600 text-xs font-medium" title="Hapus"><i class="fas fa-trash"></i></button></td></tr>`}).join('')}</tbody></table></div>${pagHTML(mP,totalFiltered,mPS,'m','updMitraList')}${hasActiveBT?`<div class="px-4 py-1 border-t border- function handleNamaSelect(val){const manualInput=$('fNmManual'),nikInput=$('fNik'),tlpInput=$('fTlp'),alInput=$('fAl');if(val==='__manual__'){manualInput.classList.remove('hidden');manualInput.focus();setFieldRO(nikInput,false);setFieldRO(tlpInput,false);setFieldRO(alInput,false);nikInput.value='';tlpInput.value='';alInput.value=''}else if(val){const d=S.dbMitra.find(x=>x.id===val);if(d){manualInput.classList.add('hidden');manualInput.value='';nikInput.value=d.nik;tlpInput.value=d.noHp||'';alInput.value=d.alamat;setFieldRO(nikInput,true);setFieldRO(tlpInput,true);setFieldRO(alInput,true);toast('Data dari database terisi otomatis','info')}}else{manualInput.classList.add('hidden');manualInput.value='';nikInput.value='';tlpInput.value='';alInput.value='';setFieldRO(nikInput,false);setFieldRO(tlpInput,false);setFieldRO(alInput,false)}}

function handleJenisSelect(sel){const row=sel.closest('tr'),manualInput=row.querySelector('.lj-manual'),nilaiInput=row.querySelector('.ln');if(sel.value==='__manual__'){manualInput.classList.remove('hidden');manualInput.focus();nilaiInput.value=''}else if(sel.value){manualInput.classList.add('hidden');manualInput.value='';const keg=S.jenisKegiatan.find(k=>k.nama===sel.value);if(keg)nilaiInput.value=keg.nilai}else{manualInput.classList.add('hidden');manualInput.value='';nilaiInput.value=''}updLampTotal()}
function addLampRow(){$('lampBody').insertAdjacentHTML('beforeend',lampRowHTML({jenis:'',jumlah:0,nilaiPerRD:0},$('lampBody').children.length))}
function updLampTotal(){const rows=$('lampBody').children;let tot=0;for(const r of rows){const j=Number(r.querySelector('.lr').value)||0,n=Number(r.querySelector('.ln').value)||0;r.children[4].textContent=fRp(j*n);tot+=j*n}$('lampTotal').textContent=fRp(tot);const w=$('lampWarn');tot>S.set.honorMaks?w.classList.remove('hidden'):w.classList.add('hidden')}

function updTglPreview(){const fTT=$('fTT')?.value||'',fTS=$('fTS')?.value||'',useTT=fTT||S.set.tglTandaTangan||'',useSelesai=fTS||S.set.tglSelesai||getAutoDates().selesai;let bulanNm='-',tahunStr='-',isCustomBulan=false;if(useTT){const d=new Date(useTT);bulanNm=BL[d.getMonth()];tahunStr=String(d.getFullYear());isCustomBulan=!!fTT}else{bulanNm=BL[S.set.bulan];tahunStr=String(S.set.tahun)}const endD=new Date(useSelesai),serah=new Date(endD),serahExt=new Date(endD);serah.setDate(serah.getDate()+5);serahExt.setDate(serahExt.getDate()+10);const hariT=useTT?HR[new Date(useTT).getDay()]:'-';const isCustomSelesai=!!fTS;const nomorEl=$('fNKText');if(nomorEl)nomorEl.textContent=getNomorPreview(fTT,_editId);const el=$('tglPreview');if(!el)return;el.innerHTML=`<div class="grid grid-cols-2 md:grid-cols-4 gap-2"><div><span class="text-gray-400 block">Bulan Kontrak</span><span class="${isCustomBulan?'text-amber-700':'text-blue-600'} font-semibold">${bulanNm} ${tahunStr}</span><span class="block text-[10px] ${isCustomBulan?'text-amber-500':'text-blue-400'}">${isCustomBulan?'dari Tgl TTD':'dari Pengaturan'}</span></div><div><span class="text-gray-400 block">Hari TTD</span><span class="font-semibold">${hariT}</span></div><div><span class="text-gray-400 block">Sumber Selesai</span><span class="${isCustomSelesai?'text-amber-700':'text-blue-600'} font-semibold">${isCustomSelesai?'Custom':'Global'}</span></div><div><span class="text-gray-400 block">Serah Terima</span><span class="font-semibold">${fTglShort(fmtD(serah))}</span></div><div><span class="text-gray-400 block">Tgl TTD Efektif</span><span class="font-semibold">${fTglShort(useTT)}</span></div><div><span class="text-gray-400 block">Batas Selesai</span><span class="font-semibold">${fTglShort(useSelesai)}</span></div><div><span class="text-gray-400 block">Perpanjangan</span><span class="font-semibold">${fTglShort(fmtD(serahExt))}</span></div><div><span class="text-gray-400 block">Durasi</span><span class="font-semibold">${useTT&&useSelesai?Math.ceil((new Date(useSelesai)-new Date(useTT))/(86400000))+' hari':'-'}</span></div></div>`}

function saveMitra(editId){const selVal=$('fNmSelect').value;let nama='';if(selVal==='__manual__'){nama=$('fNmManual').value.trim()}else if(selVal){const d=S.dbMitra.find(x=>x.id===selVal);nama=d?d.nama:''}if(!nama)return toast('Nama wajib diisi','warning');const nik=$('fNik').value.trim(),alamat=$('fAl').value.trim();if(!nik||nik.length<10)return toast('NIK tidak valid','warning');if(!alamat)return toast('Alamat wajib diisi','warning');const tl=$('fTlp').value.trim(),tglTT=$('fTT').value.trim(),tglSelesai=$('fTS').value.trim();const lampRows=$('lampBody').children;const lamp=[];for(const r of lampRows){const sel=r.querySelector('.lj'),manualInp=r.querySelector('.lj-manual');let jenis='';if(sel.value==='__manual__'){jenis=manualInp?manualInp.value.trim():''}else{jenis=sel.value.trim()}lamp.push({jenis,jumlah:Number(r.querySelector('.lr').value)||0,nilaiPerRD:Number(r.querySelector('.ln').value)||0})}const totalHonor=lamp.reduce((s,l)=>s+l.jumlah*l.nilaiPerRD,0);if(totalHonor>S.set.honorMaks)return toast('Total honor melebihi batas maksimal','warning');if(editId){const idx=S.mitra.findIndex(x=>x.id===editId);if(idx>-1)S.mitra[idx]={...S.mitra[idx],nama,nik,alamat,noTelepon:tl,tglTandaTangan:tglTT,tglSelesai,lampiran:lamp,totalHonor,updatedAt:new Date().toISOString()};toast('Data mitra diperbarui')}else{S.mitra.push({id:gid(),nomorKontrak:'',nama,nik,alamat,noTelepon:tl,tglTandaTangan:tglTT,tglSelesai,lampiran:lamp,totalHonor,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});toast('Mitra berhasil ditambahkan')}regenAllNomor();aSave();cM();render()}
function editM(id){const m=S.mitra.find(x=>x.id===id);if(!m)return;_editId=id;oM('Edit Mitra Statistik',mitraFormHTML(m,true),true,id);setTimeout(()=>{updTglPreview();updLampTotal()},60)}
function delM(id){const m=S.mitra.find(x=>x.id===id);if(!m)return;oCf('Hapus Kontrak',`Kontrak "${m.nama}" (${m.nomorKontrak}) akan dihapus.`,()=>{S.mitra=S.mitra.filter(x=>x.id!==id);regenAllNomor();aSave();render();toast('Kontrak berhasil dihapus')})}

function rSettings(){const s=S.set;return`<div class="fade-in max-w-3xl mx-auto"><div class="mb-6"><h2 class="text-2xl font-bold">Pengaturan</h2><p class="text-gray-500 text-sm mt-1">Konfigurasi PPK/BPS, tanggal default, dan honor maksimal</p></div><div class="bg-white rounded-2xl border border-cool-200 shadow-sm p-6 space-y-6"><div class="bg-blue-50 rounded-xl p-4 text-sm text-blue-800"><i class="fas fa-info-circle mr-2 text-blue-500"></i><strong>Nomor kontrak otomatis:</strong> format DDMMNNN/PPK/SPKM/YYYY. Bulan kontrak diambil dari tanggal TTD per-mitra.</div><div><h3 class="font-semibold text-sm text-gold-700 flex items-center gap-2 mb-4"><i class="fas fa-landmark"></i> Pejabat Pembuat Komitmen (PPK)</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Nama PPK</label><input id="sPpkNm" type="text" value="${esc(s.ppkNama)}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">NIP</label><input id="sPpkNip" type="text" value="${esc(s.ppkNip)}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm font-mono"></div></div></div><div><h3 class="font-semibold text-sm text-gold-700 flex items-center gap-2 mb-4"><i class="fas fa-building"></i> Informasi BPS</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Nama BPS</label><input id="sBpsNm" type="text" value="${esc(s.bpsNama)}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div class="md:col-span-2"><label class="block text-xs font-medium text-gray-500 mb-1">Alamat BPS</label><input id="sBpsAl" type="text" value="${esc(s.bpsAlamat)}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Kota</label><input id="sKota" type="text" value="${esc(s.kota)}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div></div></div><div><h3 class="font-semibold text-sm text-gold-700 flex items-center gap-2 mb-4"><i class="fas fa-file-alt"></i> Periode Default (Fallback)</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label class="block text-xs font-medium text-gray-500 mb-1">Honor Maksimal (Rp)</label><input id="sHonor" type="number" value="${s.honorMaks}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm font-mono"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Bulan Default</label><select id="sBulan" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm">${BL.map((b,i)=>`<option value="${i}" ${i===s.bulan?'selected':''}>${b}</option>`).join('')}</select></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Tahun Default</label><input id="sTahun" type="number" value="${s.tahun}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Tgl TTD Default</label><input id="sTgl" type="date" value="${s.tglTandaTangan}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div><div><label class="block text-xs font-medium text-gray-500 mb-1">Tgl Selesai Default <span class="text-gray-400 font-normal">— kosongkan = otomatis</span></label><input id="sTglSelesai" type="date" value="${s.tglSelesai}" class="w-full px-3 py-2.5 rounded-xl border border-cool-200 text-sm"></div></div></div><div class="flex justify-end"><button onclick="saveSettings()" class="btn-p px-8 py-3 rounded-xl text-sm font-semibold"><i class="fas fa-save mr-2"></i>Simpan Pengaturan</button></div></div></div>`}
function saveSettings(){S.set.ppkNama=$('sPpkNm').value.trim();S.set.ppkNip=$('sPpkNip').value.trim();S.set.bpsNama=$('sBpsNm').value.trim();S.set.bpsAlamat=$('sBpsAl').value.trim();S.set.kota=$('sKota').value.trim();S.set.honorMaks=Number($('sHonor').value)||1050000;S.set.bulan=Number($('sBulan').value);S.set.tahun=Number($('sTahun').value);S.set.tglTandaTangan=$('sTgl').value;S.set.tglSelesai=$('sTglSelesai').value.trim()||'';if(!S.set.ppkNama||!S.set.bpsNama)return toast('Nama PPK dan Nama BPS wajib diisi','warning');regenAllNomor();aSave();render();toast('Pengaturan berhasil disimpan')}

/* ===== EXPORT / IMPORT ===== */
let impMode='merge';
function rExIm(){return`<div class="fade-in max-w-3xl mx-auto"><div class="mb-6"><h2 class="text-2xl font-bold">Export / Import Data</h2><p class="text-gray-500 text-sm mt-1">Backup dan pemulihan seluruh data</p></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-white rounded-2xl border border-cool-200 shadow-sm p-6"><div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center mb-4"><i class="fas fa-file-export text-green-600 text-lg"></i></div><h3 class="font-bold mb-1">Export Data</h3><p class="text-gray-500 text-sm mb-5">Unduh seluruh data lengkap.</p><div class="space-y-3"><button onclick="exJSON()" class="w-full btn-g px-4 py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2"><i class="fas fa-code text-gold-600"></i>Export JSON</button><button onclick="exCSV()" class="w-full btn-g px-4 py-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2"><i class="fas fa-table text-blue-600"></i>Export CSV Kontrak</button></div></div><div class="bg-white rounded-2xl border border-cool-200 shadow-sm p-6"><div class="w-12 h-12 rounded-xl bg-amber-50 flex items-center justify-center mb-4"><i class="fas fa-file-import text-amber-600 text-lg"></i></div><h3 class="font-bold mb-1">Import Data</h3><p class="text-gray-500 text-sm mb-5">Pulihkan dari file JSON.</p><div class="space-y-4"><div class="border-2 border-dashed border-cool-200 rounded-xl p-6 text-center hover:border-gold-400 transition-colors"><i class="fas fa-cloud-upload-alt text-2xl text-gray-300 mb-2"></i><p class="text-sm text-gray-500 mb-3">Seret file JSON atau</p><label class="inline-block cursor-pointer btn-p px-4 py-2 rounded-xl text-sm font-medium">Pilih File<input type="file" accept=".json" onchange="imJSON(this.files[0])" class="hidden"></label></div><div class="flex gap-2"><button onclick="impMode='merge';render()" class="flex-1 px-3 py-2 rounded-lg text-xs font-medium ${impMode==='merge'?'bg-navy-900 text-white':'bg-cool-100 text-gray-600'} transition">Gabungkan</button><button onclick="impMode='replace';render()" class="flex-1 px-3 py-2 rounded-lg text-xs font-medium ${impMode==='replace'?'bg-navy-900 text-white':'bg-cool-100 text-gray-600'} transition">Ganti Semua</button></div></div></div></div><div class="mt-8 bg-white rounded-2xl border border-cool-200 shadow-sm p-6"><h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-database text-gold-600"></i> Ringkasan Data</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-4"><div class="bg-cool-50 rounded-xl p-4 text-center"><p class="text-2xl font-bold">${S.dbMitra.length}</p><p class="text-xs text-gray-500 mt-1">Database Mitra</p></div><div class="bg-cool-50 rounded-xl p-4 text-center"><p class="text-2xl font-bold">${S.jenisKegiatan.length}</p><p class="text-xs text-gray-500 mt-1">Jenis Kegiatan</p></div><div class="bg-cool-50 rounded-xl p-4 text-center"><p class="text-2xl font-bold">${S.mitra.length}</p><p class="text-xs text-gray-500 mt-1">Kontrak</p></div><div class="bg-cool-50 rounded-xl p-4 text-center"><p class="text-lg font-bold">${fRp(S.mitra.reduce((s,m)=>s+(m.totalHonor||0),0))}</p><p class="text-xs text-gray-500 mt-1">Total Honor</p></div><div class="bg-cool-50 rounded-xl p-4 text-center"><p class="text-2xl font-bold">${S.mitra.filter(m=>m.lampiran&&m.lampiran.some(l=>l.jenis&&l.jumlah>0)).length}</p><p class="text-xs text-gray-500 mt-1">Lengkap</p></div></div><div class="mt-4"><button onclick="oCf('Hapus Semua Data','Seluruh data akan dihapus permanen.',()=>{S.mitra=[];S.dbMitra=[];S.jenisKegiatan=[];localStorage.removeItem('bksApp');$('svSt').textContent='Data dihapus';S.lastSaved=null;render();toast('Semua data dihapus')})" class="btn-d px-4 py-2.5 rounded-xl text-sm font-medium"><i class="fas fa-trash-alt mr-2"></i>Hapus Semua Data</button></div></div></div>`}

function exJSON(){if(!S.mitra.length&&!S.set.ppkNama&&!S.dbMitra.length&&!S.jenisKegiatan.length)return toast('Tidak ada data','warning');dl(JSON.stringify({version:'3.0',app:'BKS',exportDate:new Date().toISOString(),settings:S.set,mitra:S.mitra,dbMitra:S.dbMitra,jenisKegiatan:S.jenisKegiatan},null,2),`bks-backup-${new Date().toISOString().split('T')[0]}.json`,'application/json');toast('Data berhasil diexport')}
function exCSV(){if(!S.mitra.length)return toast('Tidak ada data','warning');const h=['No','Nomor Kontrak','Nama','NIK','Alamat','Telepon','Tgl TTD','Tgl Selesai','Bulan Kontrak','Jenis','Jumlah','Nilai','Total Honor'];const rows=[];S.mitra.forEach((m,i)=>{const bt=getMitraBulanTahun(m);const bs=BL[bt.bulan]+' '+bt.tahun;if(m.lampiran&&m.lampiran.some(l=>l.jenis)){m.lampiran.forEach(l=>{if(l.jenis)rows.push([i+1,m.nomorKontrak,m.nama,m.nik,m.alamat,m.noTelepon,m.tglTandaTangan||'GLOBAL',m.tglSelesai||'GLOBAL',bs,l.jenis,l.jumlah,l.nilaiPerRD,l.jumlah*l.nilaiPerRD])})}else rows.push([i+1,m.nomorKontrak,m.nama,m.nik,m.alamat,m.noTelepon,m.tglTandaTangan||'GLOBAL',m.tglSelesai||'GLOBAL',bs,'-','0','0','0'])});dl('\ufeff'+[h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),`mitra-${new Date().toISOString().split('T')[0]}.csv`,'text/csv;charset=utf-8');toast('CSV berhasil diexport')}
function dl(c,f,t){const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=f;a.click();URL.revokeObjectURL(u)}
function imJSON(file){if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.mitra&&!d.settings&&!d.dbMitra&&!d.jenisKegiatan)throw new Error('Format tidak valid');if(impMode==='replace'){if(d.settings)Object.assign(S.set,d.settings);S.mitra=d.mitra||[];S.dbMitra=d.dbMitra||[];S.jenisKegiatan=d.jenisKegiatan||[]}else{if(d.settings&&!S.set.ppkNama)Object.assign(S.set,d.settings);const exI=new Set(S.mitra.map(m=>m.id));(d.mitra||[]).forEach(m=>{if(exI.has(m.id))m.id=gid();S.mitra.push(m)});const exD=new Set(S.dbMitra.map(m=>m.id));(d.dbMitra||[]).forEach(m=>{if(exD.has(m.id))m.id=gid();S.dbMitra.push(m)});const exK=new Set(S.jenisKegiatan.map(k=>k.id));(d.jenisKegiatan||[]).forEach(k=>{if(exK.has(k.id))k.id=gid();S.jenisKegiatan.push(k)})}S.dbMitra.forEach(m=>{if(m.aktif===undefined)m.aktif=true});regenAllNomor();aSave();render();toast(`Berhasil mengimpor: ${(d.mitra||[]).length} kontrak, ${(d.dbMitra||[]).length} db mitra, ${(d.jenisKegiatan||[]).length} jenis kegiatan`)}catch(err){toast('Gagal: '+err.message,'error')}};r.readAsText(file)}

/* ===== PRINT ===== */
function printK(id){const m=S.mitra.find(x=>x.id===id);if(!m)return;const html=`<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><title>Kontrak - ${esc(m.nama)}</title>${_printCSS()}</head><body>${_printToolbar(esc(m.nama),esc(m.nomorKontrak),'Cetak Kontrak A4')}${_contractBody(m)}</body></html>`;const w=window.open('','_blank','width=960,height=800');w.document.write(html);w.document.close()}
function printAll(){if(!S.mitra.length)return toast('Tidak ada kontrak','warning');let body='';S.mitra.forEach((m,i)=>{if(i>0)body+='<div class="page-break"></div>';body+=_contractBody(m)});const html=`<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><title>Batch Cetak</title>${_printCSS()}</head><body>${_printToolbar('Batch Cetak',S.mitra.length+' Kontrak','Cetak Semua ('+S.mitra.length+')')}${body}</body></html>`;const w=window.open('','_blank','width=960,height=800');w.document.write(html);w.document.close()}
function _printToolbar(sub,mono,btnLabel){return`<div class="no-print" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(180deg,rgba(21,32,54,0.97) 0%,rgba(21,32,54,0.92) 100%);backdrop-filter:blur(8px);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)"><div style="display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:13px;font-family:Outfit,sans-serif"><i class="fas fa-file-contract" style="font:size:16px;color:#dab43e"></i><span style="font-weight:600;color:#fff">${sub}</span><span style="color:rgba(255,255,255,0.3)">|</span><span style="font-family:monospace;font-size:11px">${mono}</span></div><button onclick="window.print()" style="display:inline-flex;align-items:center;gap:10px;padding:10px 28px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:Outfit,sans-serif;box-shadow:0 2px 12px rgba(37,99,235,0.4)"><i class="fas fa-print"></i> ${btnLabel}</button><button onclick="window.close()" style="display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.15);border-radius:10px;cursor:pointer;font-size:13px;font-family:Outfit,sans-serif"><i class="fas fa-times"></i> Tutup</button></div><div class="no-print" style="height:56px"></div>`}
function _printCSS(){return`<style>@page{size:A4;margin:18mm 18mm 18mm 22mm}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Times New Roman',Times,serif;font-size:11.5pt;line-height:1.65;color:#000;background:#d4d4d4}.paper{width:210mm;min-height:297mm;margin:20px auto 40px auto;padding:18mm 18mm 18mm 22mm;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.12);position:relative;box-sizing:border-box}@media print{body{background:#fff!important}.paper{width:auto;min-height:auto;margin:0!important;padding:0!important;box-shadow:none!important;page-break-after:always}.paper:last-child{page-break-after:auto}.no-print{display:none!important}}.kop{text-align:center;padding-bottom:8pt;margin-bottom:10pt}.kop-logo img{height:50pt;width:auto}.kop-title{font-size:12pt;font-weight:bold;text-transform:uppercase;letter-spacing:0.3pt;line-height:1.45}.kop-title .title-main{font-size:16pt;display:block;margin-bottom:1pt}.kop-nomor{font-size:10.5pt;font-weight:bold;margin-top:2pt}.pihak-row{display:flex;margin-bottom:5pt;text-align:justify;align-items:flex-start}.pihak-num{width:14pt;flex-shrink:0;padding-right:2pt}.pihak-name{width:155pt;flex-shrink:0;padding-right:2pt}.pihak-colon{width:10pt;flex-shrink:0;padding-right:5pt}.pihak-desc{flex:1}.pasal-title{font-weight:bold;margin-top:12pt;margin-bottom:4pt;font-size:11.5pt;text-align:center}.ayat-row{display:flex;margin-bottom:2pt;text-align:justify;align-items:flex-start}.ayat-num{width:22pt;flex-shrink:0;text-align:left}.ayat-text{flex:1;text-align:justify}.lamp-table{border-collapse:collapse;width:100%;margin:6pt 0;font-size:10pt;table-layout:fixed}.lamp-table th,.lamp-table td{border:1px solid #000;padding:3pt 5pt;vertical-align:middle}.lamp-table th{background:#f5f5f5;font-weight:bold;text-align:center}.lamp-table .num{text-align:center;width:5%}.lamp-table .jenis{text-align:left;width:50%}.lamp-table .jml{text-align:center;width:13%}.lamp-table .nilai{text-align:right;width:16%}.lamp-table .total{text-align:right;width:16%}.lamp-table tfoot td{font-weight:bold;background:#fafafa}.ttd-table{width:100%;border-collapse:collapse;margin-top:32px}.ttd-table td{width:50%;text-align:center;vertical-align:top}.ttd-title{font-weight:bold;margin-bottom:4px}.ttd-space{height:70px}.ttd-name{margin:0;line-height:1.3;font-weight:bold}.penutup{margin-top:12pt;text-align:justify;text-indent:0}.page-break{page-break-before:always;break-before:page}.p5-break{page-break-before:always;break-before:page}</style>`}
function _contractBody(m){const s=S.set,tglTT=getMitraTglTandaTangan(m),tgl=new Date(tglTT),mitraBulan=tgl.getMonth(),mitraTahun=tgl.getFullYear(),bulanNm=BL[mitraBulan],yy=mitraTahun,dd=tgl.getDate(),hariT=HR[tgl.getDay()],tanggalStr=terbilang(dd)+' bulan '+bulanNm.toLowerCase()+' tahun '+terbilang(yy),md=getMitraDates(m),tglSelesai=fTgl(md.selesai),tglSerah=fTgl(md.serah),tglSerahExt=fTgl(md.serExt);
  function ar(n,t){return`<div class="ayat-row"><span class="ayat-num">(${n}).</span><span class="ayat-text">${t}</span></div>`}
  const lamp=m.lampiran||[];const hasLamp=lamp.some(l=>l.jenis&&l.jumlah>0);const totHonor=lamp.reduce((t,l)=>t+(l.jumlah||0)*(l.nilaiPerRD||0),0);const honorNilai=totHonor>0?totHonor:s.honorMaks;const honorStr=fRp(honorNilai),honorTerbilang=terbilang(honorNilai);
  let lampHTML='';if(hasLamp){lampHTML=`<table class="lamp-table"><thead><tr><th class="num">No</th><th class="jenis">Jenis Pendataan</th><th class="jml">Jumlah Dokumen</th><th class="nilai">Nilai (Rp)</th><th class="total">Total Nilai (Rp)</th></tr></thead><tbody>`;let ri=0;lamp.forEach(l=>{if(l.jenis){ri++;lampHTML+=`<tr><td class="num">${ri}</td><td class="jenis">${esc(l.jenis)}</td><td class="jml">${l.jumlah}</td><td class="nilai">${Number(l.nilaiPerRD).toLocaleString('id-ID')}</td><td class="total">${Number(l.jumlah*l.nilaiPerRD).toLocaleString('id-ID')}</td></tr>`}});lampHTML+=`</tbody><tfoot><tr><td colspan="4" style="text-align:center;padding-right:5pt">JUMLAH TOTAL</td><td class="total" style="padding-right:5pt">${Number(totHonor).toLocaleString('id-ID')}</td></tr></tfoot></table>`}
  return`<div class="paper">
<div class="kop"><div class="kop-logo"><img src="https://z-cdn-media.chatglm.cn/files/b8bffa74-ccd7-43df-ac0a-7d38232e3901.png?auth_key=1872868863-b6cd966dc51a4c34aa738032b487a895-0-e6beed34fb7fb9a9650976366f590c26" style="width:60px;height:auto" alt="Logo BPS"></div><p class="kop-title"><span class="title-main">Perjanjian Kerja</span>Mitra Statistik Bulan ${bulanNm} Tahun ${yy}<br>${esc(s.bpsNama)}</p><p class="kop-nomor">NOMOR: ${esc(m.nomorKontrak)}</p></div>
<p style="text-indent:0;text-align:justify;margin-bottom:8pt">Pada hari ini, ${hariT.toLowerCase()}, tanggal ${tanggalStr}, bertempat di ${esc(s.kota)}, yang bertanda tangan di bawah ini:</p>
<div class="pihak-row"><span class="pihak-num">1.</span><span class="pihak-name">${esc(s.ppkNama)}</span><span class="pihak-colon">:</span><span class="pihak-desc">Pejabat Pembuat Komitmen ${esc(s.bpsNama)}, alamat ${esc(s.bpsAlamat)} bertindak untuk dan atas nama ${esc(s.bpsNama)} selanjutnya disebut <b>PIHAK PERTAMA</b>.</span></div>
<div class="pihak-row"><span class="pihak-num">2.</span><span class="pihak-name">${esc(m.nama)}</span><span class="pihak-colon">:</span><span class="pihak-desc">beralamat di ${esc(m.alamat)}, bertindak untuk dan atas nama diri sendiri, selanjutnya disebut <b>PIHAK KEDUA</b>.</span></div>
<p style="text-indent:0;text-align:justify;margin-top:7pt;margin-bottom:7pt">bahwa <b>PIHAK PERTAMA</b> dan <b>PIHAK KEDUA</b> yang secara bersama-sama disebut <b>PARA PIHAK</b>, sepakat untuk mengikatkan diri dalam Perjanjian Kerja bulan ${bulanNm} ${yy} di ${esc(s.bpsNama)} yang selanjutnya disebut Perjanjian, dengan ketentuan-ketentuan sebagai berikut:</p>
<p class="pasal-title">Pasal 1</p><p style="text-indent:0;text-align:justify;margin-bottom:2pt"><b>PIHAK PERTAMA</b> memberikan pekerjaan kepada <b>PIHAK KEDUA</b> dan <b>PIHAK KEDUA</b> menerima pekerjaan dari <b>PIHAK PERTAMA</b> sebagai Petugas Pendataan Lapangan (sesuai pasal 5) bulan ${bulanNm} Tahun ${yy}, dengan lingkup pekerjaan yang ditetapkan oleh <b>PIHAK PERTAMA</b>.</p>
<p class="pasal-title">Pasal 2</p><p style="text-indent:0;text-align:justify;margin-bottom:2pt">Ruang lingkup pekerjaan dalam Perjanjian ini mengacu pada kegiatan pendataan di ${esc(s.bpsNama)}, dan ketentuan-ketentuan yang ditetapkan oleh <b>PIHAK PERTAMA</b>.</p>

      setTimeout(()=>updKegList(),0);
      break;
    case 'mitra':

      break;

      mc.innerHTML=rExIm();
      break;

}
