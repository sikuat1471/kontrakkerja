function getMitraTglTandaTangan(m){return m.tglTandaTangan||S.set.tglTandaTangan||''}
function getNextSeq(tglTT,excludeId){if(!tglTT)return 1;const existing=S.mitra.filter(m=>{if(excludeId&&m.id===excludeId)return false;return getMitraTglTandaTangan(m)===tglTT&&m.nomorKontrak});const usedSeqs=new Set();existing.forEach(m=>{const parts=m.nomorKontrak.split('/');if(parts.length===4){const seq=parseInt(parts[0].substring(4));if(seq>0)usedSeqs.add(seq)}});let seq=1;while(usedSeqs.has(seq))seq++;return seq}
function getNomorPreview(formTT,excludeId){const tglTT=formTT||S.set.tglTandaTangan||'';if(!tglTT)return{nomor:'-',isDup:false,conflictWith:''};const d=new Date(tglTT),dd=pad2(d.getDate()),mm=pad2(d.getMonth()+1),yyyy=d.getFullYear();const seq=getNextSeq(tglTT,excludeId);const nomor=dd+mm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+yyyy;const conflict=S.mitra.find(m=>m.id!==excludeId&&m.nomorKontrak===nomor);return{nomor,isDup:!!conflict,conflictWith:conflict?conflict.nama:''}}
function regenAllNomor(){const groups={};S.mitra.forEach(m=>{const ttd=getMitraTglTandaTangan(m);if(!ttd)return;const d=new Date(ttd);const key=pad2(d.getDate())+pad2(d.getMonth()+1)+d.getFullYear();if(!groups[key])groups[key]={ddmm:key.substring(0,4),yyyy:key.substring(4),items:[]};groups[key].items.push(m)});Object.values(groups).forEach(g=>{g.items.sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));const usedNums=new Set();g.items.forEach(m=>{if(m.nomorKontrak){const parts=m.nomorKontrak.split('/');if(parts.length===4&&parts[0].startsWith(g.ddmm)){const seq=parseInt(parts[0].substring(4));if(seq>0)usedNums.add(seq)}}});g.items.forEach(m=>{if(!m.nomorKontrak||m.nomorKontrak.trim()===''){let seq=1;while(usedNums.has(seq))seq++;m.nomorKontrak=g.ddmm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+g.yyyy;usedNums.add(seq)}})})}
function fixDuplicates(){const used=new Set();const sorted=[...S.mitra].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));sorted.forEach(m=>{if(!m.nomorKontrak)return;if(used.has(m.nomorKontrak)){const ttd=getMitraTglTandaTangan(m);if(!ttd)return;const d=new Date(ttd);const ddmm=pad2(d.getDate())+pad2(d.getMonth());const yyyy=d.getFullYear();let seq=1;let newNomor;do{newNomor=ddmm+String(seq).padStart(3,'0')+'/PPK/SPKM/'+yyyy;seq++}while(used.has(newNomor));m.nomorKontrak=newNomor}used.add(m.nomorKontrak)})}
function findDuplicates(){const map=new Map();const dups=[];S.mitra.forEach(m=>{if(!m.nomorKontrak)return;if(map.has(m.nomorKontrak)){dups.push({nomor:m.nomorKontrak,existing:map.get(m.nomorKontrak),duplicate:m})}else map.set(m.nomorKontrak,m)});return dups}
function calcSelesaiFromTTD(tglTT){if(!tglTT)return'';const d=new Date(tglTT),m=d.getMonth(),y=d.getFullYear();return y+'-'+pad2(m+1)+'-'+lastDay(m,y)}
function getAutoDates(){const m=S.set.bulan,y=S.set.tahun,ld=lastDay(m,y);const selesai=y+'-'+pad2(m+1)+'-'+ld;const ed=new Date(selesai),s1=new Date(ed),s2=new Date(ed);s1.setDate(s1.getDate()+5);s2.setDate(s2.getDate()+10);return{selesai,serah:fmtD(s1),serExt:fmtD(s2)}}
function getMitraTglSelesai(m){return m.tglSelesai||S.set.tglSelesai||getAutoDates().selesai}
function getMitraBulanTahun(m){const tglTT=getMitraTglTandaTangan(m);if(tglTT){const d=new Date(tglTT);return{bulan:d.getMonth(),tahun:d.getFullYear()}}return{bulan:S.set.bulan,tahun:S.set.tahun}}
function getMitraDates(m){const tglSelesai=getMitraTglSelesai(m),endD=new Date(tglSelesai),serah=new Date(endD),serahExt=new Date(endD);serah.setDate(serah.getDate()+5);serahExt.setDate(serahExt.getDate()+10);return{selesai:tglSelesai,serah:fmtD(serah),serExt:fmtD(serahExt)}}
function terbilang(n){if(n===0)return'nol';const s=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan'],b=['','ribu','juta','miliar','triliun'],bl=['sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas'];let r='',neg=false;if(n<0){neg=true;n=-n}n=Math.floor(n);let i=0;while(n>0){let c=n%1000;n=Math.floor(n/1000);let cs='',cO=c;if(c>=100){cs+=s[Math.floor(c/100)]+' ratus ';c%=100}if(c>=11&&c<=19)cs+=bl[c-11]+' ';else if(c===10)cs+='sepuluh ';else if(c>=20){cs+=s[Math.floor(c/10)]+' puluh ';c%=10;if(c>0)cs+=s[c]+' '}else if(c>0)cs+=s[c]+' ';if(cO===1&&i===1&&n===0)cs='seribu ';else if(cO>0)cs+=b[i]+' ';r=cs+r;i++}return(neg?'minus ':'')+r.trim()}
function formatNomorBadge(nomor,isDup){if(!nomor)return'-';const parts=nomor.split('/');const cls=isDup?'nomor-kontrak-badge dup':'nomor-kontrak-badge';if(parts.length===4){return'<span class="'+cls+'" title="'+(isDup?'NOMOR DUPLIKAT!':'')+'">'+parts[0]+'<span class="nk-slash">/</span>'+parts[1]+'<span class="nk-slash">/</span>'+parts[2]+'<span class="nk-slash">/</span>'+parts[3]+(isDup?' <i class="fas fa-exclamation-triangle" style="font-size:9px"></i>':'')+'</span>'}return'<span class="'+cls+'">'+nomor+'</span>'}
function toast(msg,type='success'){const ic={success:'fa-check-circle text-green-500',error:'fa-times-circle text-red-500',warning:'fa-exclamation-circle text-amber-500',info:'fa-info-circle text-blue-500'},bg={success:'border-green-200',error:'border-red-200',warning:'border-amber-200',info:'border-blue-200'};const el=document.createElement('div');el.className=`toast-in pointer-events-auto flex items-center gap-3 bg-white border ${bg[type]} rounded-xl shadow-lg px-4 py-3 min-w-[280px] max-w-[400px]`;el.innerHTML=`<i class="fas ${ic[type]}"></i><span class="text-sm text-gray-700 flex-1">${msg}</span>`;$('tC').appendChild(el);setTimeout(()=>{el.classList.replace('toast-in','toast-out');setTimeout(()=>el.remove(),250)},3000)}

const _ssCb={};
function ssHTML(id,opts,selected,placeholder){placeholder=placeholder||'-- Pilih --';const selOpt=opts.find(o=>o.value===selected&&!o.hidden);const dt=selOpt?selOpt.label:placeholder;const isPh=!selOpt;let h='<div class="ss-wrap" id="ss-'+id+'">';h+='<div class="ss-trigger" onclick="ssToggle(\''+id+'\')"><span class="ss-display'+(isPh?' ph':'')+'">'+esc(dt)+'</span><i class="fas fa-chevron-down ss-arrow"></i></div>';h+='<div class="ss-panel" id="ssp-'+id+'"><div class="ss-search"><i class="fas fa-search"></i><input type="text" placeholder="Ketik untuk mencari..." oninput="ssFilter(\''+id+'\',this.value)" onkeydown="ssKeyNav(event,\''+id+'\')"></div>';h+='<div class="ss-list" id="ssl-'+id+'">';opts.forEach(o=>{if(o.hidden)return;const cls=(o.value===selected?' active':'')+(o.special?' special':'');h+='<div class="ss-opt'+cls+'" data-val="'+esc(o.value)+'" onmousedown="ssPick(\''+id+'\',this.dataset.val)"><span class="ss-ol">'+esc(o.label)+'</span>';if(o.extra)h+='<span class="ss-oe">'+esc(o.extra)+'</span>';h+='</div>'});h+='</div></div></div>';return h}
function ssInit(id,cb){_ssCb[id]=cb}
function ssToggle(id){ssCloseAll(id);const panel=$('ssp-'+id);const wrap=$('ss-'+id);if(!panel||!wrap)return;const trigger=wrap.querySelector('.ss-trigger');const isOpen=panel.classList.contains('show');if(isOpen){panel.classList.remove('show');trigger?.classList.remove('open')}else{panel.classList.add('show');trigger?.classList.add('open');ssPosition(id);const inp=panel.querySelector('.ss-search input');if(inp){inp.value='';ssFilter(id,'');setTimeout(()=>inp.focus(),60)}}}
function ssPosition(id){const trigger=document.querySelector('#ss-'+id+' .ss-trigger');const panel=$('ssp-'+id);if(!trigger||!panel)return;const r=trigger.getBoundingClientRect();const vw=window.innerWidth;let w=r.width;if(w<200)w=200;let left=r.left;if(left+w>vw-8)left=vw-w-8;if(left<8)left=8;panel.style.top=(r.bottom+4)+'px';panel.style.left=left+'px';panel.style.width=w+'px'}
function ssCloseAll(exceptId){document.querySelectorAll('.ss-panel.show').forEach(p=>{const id=p.id.replace('ssp-','');if(id!==exceptId){p.classList.remove('show');const wrap=$('ss-'+id);wrap?.querySelector('.ss-trigger')?.classList.remove('open')}})}
function ssFilter(id,q){const list=$('ssl-'+id);if(!list)return;q=q.toLowerCase();const opts=list.querySelectorAll('.ss-opt');let vis=0;opts.forEach(o=>{const label=o.querySelector('.ss-ol')?.textContent?.toLowerCase()||'';const extra=o.querySelector('.ss-oe')?.textContent?.toLowerCase()||'';const match=!q||label.includes(q)||extra.includes(q);o.style.display=match?'':'none';if(match)vis++});let nr=list.querySelector('.ss-nores');if(vis===0){if(!nr){nr=document.createElement('div');nr.className='ss-nores';nr.innerHTML='<i class="fas fa-search"></i>Tidak ditemukan';list.appendChild(nr)}nr.style.display=''}else if(nr){nr.style.display='none'}}
function ssKeyNav(e,id){if(e.key==='Escape'){ssCloseAll();e.preventDefault()}else if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();const list=$('ssl-'+id);if(!list)return;const vis=[...list.querySelectorAll('.ss-opt')].filter(o=>o.style.display!=='none');if(!vis.length)return;const cur=list.querySelector('.ss-opt.hover');if(cur)cur.classList.remove('hover');let idx=-1;if(cur){idx=vis.indexOf(cur)}if(e.key==='ArrowDown')idx=Math.min(idx+1,vis.length-1);else idx=Math.max(idx-1,0);vis[idx]?.classList.add('hover');vis[idx]?.scrollIntoView({block:'nearest'})}else if(e.key==='Enter'){e.preventDefault();const list=$('ssl-'+id);const hov=list?.querySelector('.ss-opt.hover');if(hov)ssPick(id,hov.dataset.val)}}
function ssPick(id,val){const wrap=$('ss-'+id);const panel=$('ssp-'+id);const list=$('ssl-'+id);if(!wrap||!panel||!list)return;list.querySelectorAll('.ss-opt').forEach(o=>{o.classList.toggle('active',o.dataset.val===val);o.classList.remove('hover')});const act=list.querySelector('.ss-opt.active');const disp=wrap.querySelector('.ss-display');if(act&&disp){disp.textContent=act.querySelector('.ss-ol')?.textContent||'';disp.classList.remove('ph')}else if(!val&&disp){disp.textContent='-- Pilih --';disp.classList.add('ph')}panel.classList.remove('show');wrap.querySelector('.ss-trigger')?.classList.remove('open');if(_ssCb[id])_ssCb[id](val)}
function ssVal(id){const list=$('ssl-'+id);const act=list?.querySelector('.ss-opt.active');return act?act.dataset.val:''}

function pagHTML(cp,total,ps,pv,uf){const tp=Math.ceil(total/ps);if(total===0)return'';if(tp<=1)return'<div class="px-4 py-2 border-t border-cool-200 text-[11px] text-gray-400">Menampilkan '+total+' data</div>';const s=(cp-1)*ps+1,e=Math.min(cp*ps,total);let h='<div class="px-4 py-2.5 border-t border-cool-200 flex flex-col sm:flex-row items-center justify-between gap-2"><span class="text-[11px] text-gray-400">Menampilkan '+s+'–'+e+' dari '+total+'</span><div class="flex items-center gap-2"><select onchange="'+pv+'PS=Number(this.value);'+pv+'P=1;'+uf+'()" class="px-2 py-1 rounded-md border border-cool-200 text-[11px] bg-white cursor-pointer font-medium">';[20,30,50,100].forEach(v=>{h+='<option value="'+v+'"'+(v===ps?' selected':'')+'>'+v+' / hal</option>'});h+='</select><div class="flex items-center gap-0.5">';h+='<button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P=1;'+uf+'()" '+(cp<=1?'disabled':'')+'><i class="fas fa-angle-double-left" style="font-size:9px"></i></button>';h+='<button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+(cp-1)+';'+uf+'()" '+(cp<=1?'disabled':'')+'><i class="fas fa-angle-left" style="font-size:9px"></i></button>';let sp=Math.max(1,cp-2),ep=Math.min(tp,sp+4);if(ep-sp<4)sp=Math.max(1,ep-4);if(sp>1)h+='<span class="pag-dots">…</span>';for(let p=sp;p<=ep;p++){h+=p===cp?'<button class="pag-btn active">'+p+'</button>':'<button class="pag-btn bg-cool-100 text-gray-600" onclick="'+pv+'P='+p+';'+uf+'()">'+p+'</button>'}if(ep<tp)h+='<span class="pag-dots">…</span>';h+='<button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+(cp+1)+';'+uf+'()" '+(cp>=tp?'disabled':'')+'><i class="fas fa-angle-right" style="font-size:9px"></i></button>';h+='<button class="pag-btn bg-cool-100 text-gray-500" onclick="'+pv+'P='+tp+';'+uf+'()" '+(cp>=tp?'disabled':'')+'><i class="fas fa-angle-double-right" style="font-size:9px"></i></button>';h+='</div></div></div>';return h}
function bulanBadge(m){const bt=getMitraBulanTahun(m);const isCustom=!!m.tglTandaTangan;const label=BL[bt.bulan]+' '+bt.tahun;return isCustom?'<span class="date-badge custom"><i class="fas fa-user" style="font-size:8px"></i>'+label+'</span>':'<span class="date-badge global"><i class="fas fa-globe" style="font-size:8px"></i>'+label+'</span>'}
function getMonthDistForYear(year){const dist=[];for(let i=0;i<12;i++)dist.push({bulan:i,tahun:year,count:0,honor:0});S.mitra.forEach(m=>{const bt=getMitraBulanTahun(m);if(bt.tahun===year){dist[bt.bulan].count++;dist[bt.bulan].honor+=(m.totalHonor||0)}});return dist}

function updMitraList(){const el=$('mitraListWrap');if(!el)return;const dupSet=new Set(findDuplicates().map(d=>d.nomor));let list=[...S.mitra];if(mFilterBulan>=0)list=list.filter(m=>getMitraBulanTahun(m).bulan===mFilterBulan);if(mFilterTahun>0)list=list.filter(m=>getMitraBulanTahun(m).tahun===mFilterTahun);if(mFilter==='lengkap')list=list.filter(m=>m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='belum')list=list.filter(m=>!m.lampiran||!m.lampiran.length||!m.lampiran.some(l=>l.jenis&&l.jumlah>0));if(mFilter==='custom')list=list.filter(m=>m.tglTandaTangan);if(mSearch){const q=mSearch.toLowerCase();list=list.filter(m=>m.nama.toLowerCase().includes(q)||m.nik.includes(q)||m.nomorKontrak.toLowerCase().includes(q))}list.sort((a,b)=>(b.nomorKontrak||'').localeCompare(a.nomorKontrak||''));const totalFiltered=list.length;if(!totalFiltered){el.innerHTML='<div class="px-6 py-16 text-center text-gray-400"><i class="fas fa-inbox text-3xl mb-3 block"></i>'+(mSearch||mFilter!=='all'||(mFilterBulan>=0||mFilterTahun>0)?'Tidak ada mitra yang cocok dengan filter':'Belum ada kontrak.')+'</div>';return}const start=(mP-1)*mPS,end=Math.min(mP*mPS,totalFiltered),pageItems=list.slice(start,end);el.innerHTML='<div class="tbl-scroll"><table class="w-full ctbl"><thead><tr class="text-center"><th class="w-7">No</th><th style="width:190px">Nomor Kontrak</th><th>Nama</th><th class="text-center">Bulan</th><th class="text-center">Tgl TTD</th><th class="text-center hidden lg:table-cell">Tgl Selesai</th><th class="text-center">Status</th><th class="text-center">Honor<br><span class="text-[9px] font-normal block mt-0.5">(Rp.)</span></th><th class="text-center w-28">Aksi</th></tr></thead><tbody>'+pageItems.map((m,i)=>{const hasLamp=m.lampiran&&m.lampiran.length>0&&m.lampiran.some(l=>l.jenis&&l.jumlah>0);const isDup=dupSet.has(m.nomorKontrak);return'<tr class="tbl-row border-b border-cool-100 last:border-0 '+(isDup?'bg-red-50/50':'')+'"><td class="text-[11px]">'+(start+i+1)+'</td><td>'+formatNomorBadge(m.nomorKontrak,isDup)+'</td><td class="font-medium">'+esc(m.nama)+(isDup?' <i class="fas fa-exclamation-triangle text-red-500" style="font-size:9px" title="Duplikat!"></i>':'')+'</td><td class="text-center">'+bulanBadge(m)+'</td><td class="text-center">'+(m.tglTandaTangan?'<span class="date-badge custom"><i class="fas fa-lock" style="font-size:7px"></i>'+fTglShort(m.tglTandaTangan)+'</span>':'<span class="date-badge global"><i class="fas fa-globe" style="font-size:8px"></i>'+fTglShort(S.set.tglTandaTangan||'')+'</span>')+'</td><td class="text-center hidden lg:table-cell">'+(m.tglSelesai?'<span class="date-badge custom"><i class="fas fa-lock" style="font-size:7px"></i>'+fTglShort(m.tglSelesai)+'</span>':'<span class="date-badge global"><i class="fas fa-globe" style="font-size:8px"></i>'+fTglShort(S.set.tglSelesai||getAutoDates().selesai)+'</span>')+'</td><td class="text-center">'+(hasLamp?'<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-green-50 text-green-700">Lengkap</span>':'<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-amber-50 text-amber-700">Belum</span>')+'</td><td class="font-mono text-[11px] text-right">'+Number(m.totalHonor||0).toLocaleString('id-ID')+'</td><td class="text-right whitespace-nowrap"><button onclick="viewM(\''+m.id+'\')" class="text-blue-500 hover:text-blue-600 text-xs font-medium mr-1" title="Lihat"><i class="fas fa-eye"></i></button><button onclick="editM(\''+m.id+'\')" class="text-amber-400 hover:text-amber-500 text-xs font-medium mr-1" title="Edit"><i class="fas fa-pen"></i></button><button onclick="printK(\''+m.id+'\')" class="text-blue-500 hover:text-blue-600 text-xs font-medium mr-1" title="Cetak"><i class="fas fa-print"></i></button><button onclick="delM(\''+m.id+'\')" class="text-red-400 hover:text-red-500 text-xs font-medium" title="Hapus"><i class="fas fa-trash"></i></button></td></tr>'}).join('')+'</t function lampRowHTML(l,rowNum,lidx){const kegMatch=findKegiatanByNama(l.jenis);const sortedKeg=[...S.jenisKegiatan].sort((a,b)=>(a.nama||'').localeCompare(b.nama||''));let opts=[],selVal='',showManual=false,manualVal='';if(sortedKeg.length){sortedKeg.forEach(k=>{opts.push({value:k.nama,label:k.nama,extra:Number(k.nilai).toLocaleString('id-ID')});if(kegMatch&&k.nama===l.jenis)selVal=k.nama});opts.push({value:'__manual__',label:'✏️ Lainnya',special:true});if(!kegMatch&&l.jenis){selVal='__manual__';showManual=true;manualVal=l.jenis}}else{opts=[{value:'__manual__',label:'✏️ Ketik Manual',special:true}];selVal='__manual__';showManual=true}const jml=l.jumlah||0,npr=l.nilaiPerRD||0,tot=jml*npr;return'<tr class="border-t border-cool-100" data-lidx="'+lidx+'" data-ljidx="'+lidx+'"><td style="padding:4px 8px;text-align:center;color:#94a3b8;font-size:11px">'+(rowNum+1)+'</td><td style="padding:4px 8px">'+ssHTML('lj-'+lidx,opts,selVal,'Cari jenis...')+'<input type="text" value="'+esc(manualVal)+'" class="lj-manual lamp-input '+(showManual?'':'hidden')+'" style="margin-top:3px;width:100%" placeholder="Ketik jenis..."></td><td style="padding:4px 8px"><input type="number" value="'+(jml||'')+'" min="0" onchange="updLampTotal()" class="lj lamp-input lamp-input-sm lr"></td><td style="padding:4px 8px"><input type="text" value="'+(npr?Number(npr).toLocaleString('id-ID'):'-')+'" readonly class="lamp-input-frozen ln" tabindex="-1"></td><td style="padding:4px 8px;text-align:right;font-family:Courier New,monospace;font-size:11.5px;font-weight:600;color:#475569;background:#f0f4f8;padding:5px 7px;border-radius:6px">'+(tot?Number(tot).toLocaleString('id-ID'):'-')+'</td><td style="padding:4px 4px"><button onclick="this.closest(\'tr\').remove();updLampTotal()" class="f-btn-del"><i class="fas fa-times" style="font-size:10px"></i></button></td></tr>'}
function handleNamaSelect(val){const mi=$('fNmManual'),ni=$('fNik'),tl=$('fTlp'),al=$('fAl');if(val==='__manual__'){mi.classList.remove('hidden');mi.focus();setFieldRO(ni,false);setFieldRO(tl,false);setFieldRO(al,false);ni.value='';tl.value='';al.value=''}else if(val){const d=S.dbMitra.find(x=>x.id===val);if(d){mi.classList.add('hidden');mi.value='';ni.value=d.nik;tl.value=d.noHp||'';al.value=d.alamat;setFieldRO(ni,true);setFieldRO(tl,true);setFieldRO(al,true);toast('Data dari database terisi otomatis','info')}}else{mi.classList.add('hidden');mi.value='';ni.value='';tl.value='';al.value='';setFieldRO(ni,false);setFieldRO(tl,false);setFieldRO(al,false)}}

function addLampRow(){const idx=_lampIdx++;const html=lampRowHTML({jenis:'',jumlah:0,nilaiPerRD:0},$('lampBody').children.length,idx);$('lampBody').insertAdjacentHTML('beforeend',html);ssInit('lj-'+idx,val=>handleJenisSelect(idx,val));updLampTotal()}
function updLampTotal(){const rows=$('lampBody').children;let tot=0;for(const r of rows){const j=Number(r.querySelector('.lr').value)||0;const ni=r.querySelector('.ln');const nStr=ni?ni.value.replace(/[^\d-]/g,''):'';const n=Number(nStr)||0;const totCell=r.children[4];const cellVal=j*n;totCell.textContent=cellVal?Number(cellVal).toLocaleString('id-ID'):'-';tot+=cellVal}$('lampTotal').textContent=fRp(tot);const w=$('lampWarn'),tv=$('lampTotal');tot>S.set.honorMaks?(w.style.display='inline-flex',tv.classList.add('over')):(w.style.display='none',tv.classList.remove('over'))}
function updTglPreview(){if(_editId){const m=S.mitra.find(x=>x.id===_editId);if(m&&m.nomorKontrak){const nkEl=$('fNKPreview'),nkText=$('fNKText');if(nkText)nkText.textContent=m.nomorKontrak;if(nkEl&&!nkEl.classList.contains('locked')){nkEl.classList.add('locked');const labelEl=nkEl.querySelector('.nk-label');if(labelEl)labelEl.innerHTML='<i class="fas fa-lock" style="font-size:8px;margin-right:2px"></i>Nomor Kontrak (Tetap)';const iconEl=nkEl.querySelector('i:last-child');if(iconEl){iconEl.className='fas fa-lock';iconEl.style.color='#64748b'}}const dupWarn=$('fNKDupWarn');if(dupWarn)dupWarn.style.display='none';updTglChipsOnly();return}}const fTT=$('fTT')?.value||'';const preview=getNomorPreview(fTT,_editId);const nkEl=$('fNKPreview'),nkText=$('fNKText'),dupWarn=$('fNKDupWarn');if(nkText)nkText.textContent=preview.nomor;if(nkEl){if(preview.isDup){nkEl.className='nk-compact dup-warn';nkEl.id='fNKPreview';const iconEl=nkEl.querySelector('i:last-child');if(iconEl){iconEl.className='fas fa-exclamation-triangle';iconEl.style.color=''}const labelEl=nkEl.querySelector('.nk-label');if(labelEl)labelEl.innerHTML='Nomor Kontrak'}else{nkEl.className='nk-compact';nkEl.id='fNKPreview';const iconEl=nkEl.querySelector('i:last-child');if(iconEl){iconEl.className='fas fa-check-circle';iconEl.style.color=''}const labelEl=nkEl.querySelector('.nk-label');if(labelEl)labelEl.innerHTML='Nomor Kontrak'}}if(dupWarn){if(preview.isDup){dupWarn.style.display='block';dupWarn.innerHTML='<div class="dup-warn-bar"><i class="fas fa-exclamation-triangle"></i><span><b>Duplikat!</b> Nomor ini sudah dipakai oleh <b>'+esc(preview.conflictWith)+'</b>.</span></div>'}else{dupWarn.style.display='none'}}updTglChipsOnly()}
function updTglChipsOnly(){const fTT=$('fTT')?.value||'',fTS=$('fTS')?.value||'';const useTT=fTT||S.set.tglTandaTangan||'',useSelesai=fTS||S.set.tglSelesai||getAutoDates().selesai;let bulanNm='-',tahunStr='-',isCustomBulan=false;if(useTT){const d=new Date(useTT);bulanNm=BL[d.getMonth()];tahunStr=String(d.getFullYear());isCustomBulan=!!fTT}else{bulanNm=BL[S.set.bulan];tahunStr=String(S.set.tahun)}const endD=new Date(useSelesai),serah=new Date(endD);serah.setDate(serah.getDate()+5);const hariT=useTT?HR[new Date(useTT).getDay()]:'-';const durasi=useTT&&useSelesai?Math.ceil((new Date(useSelesai)-new Date(useTT))/(86400000))+' hari':'-';const el=$('tglPreview');if(!el)return;el.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">'+'<span class="tgl-chip '+(isCustomBulan?'from-custom':'from-global')+'"><i class="fas '+(isCustomBulan?'fa-user':'fa-globe')+'" style="font-size:8px"></i>'+bulanNm+' '+tahunStr+'</span>'+'<span style="font-size:10px;color:#cbd5e1">|</span><span style="font-size:10.5px;color:#475569"><i class="fas fa-calendar-day" style="font-size:9px;color:#94a3b8;margin-right:3px"></i>'+hariT+'</span>'+'<span style="font-size:10px;color:#cbd5e1">|</span><span style="font-size:10.5px;color:#475569"><i class="fas fa-flag-checkered" style="font-size:9px;color:#94a3b8;margin-right:3px"></i>'+fTglShort(useSelesai)+'</span>'+'<span style="font-size:10px;color:#cbd5e1">|</span><span class="tgl-chip from-calc"><i class="fas fa-handshake" style="font-size:8px"></i>Serah: '+fTglShort(fmtD(serah))+'</span>'+'<span style="font-size:10px;color:#cbd5e1">|</span><span style="font-size:10.5px;color:#475569"><i class="fas fa-clock" style="font-size:9px;color:#94a3b8;margin-right:3px"></i>'+durasi+'</span>'+(!isCustomBulan&&!fTS?'<span class="snap-badge" style="margin-left:2px"><i class="fas fa-camera"></i>Akan di-snapshot</span>':'<span class="snap-badge" style="margin-left:2px;background:#fef3c7;border-color:#fde68a;color:#92400e"><i class="fas fa-l function saveMitra(editId){const ssVal_nama=ssVal('ss-mitra-nm');let nama='';if(ssVal_nama==='__manual__'){nama=$('fNmManual').value.trim()}else if(ssVal_nama){const d=S.dbMitra.find(x=>x.id===ssVal_nama);nama=d?d.nama:''}if(!nama)return toast('Nama wajib diisi','warning');const nik=$('fNik').value.trim(),alamat=$('fAl').value.trim();if(!nik||nik.length<10)return toast('NIK tidak valid','warning');if(!alamat)return toast('Alamat wajib diisi','warning');const tl=$('fTlp').value.trim();const tglTT=$('fTT').value.trim(),tglSelesai=$('fTS').value.trim();const snapTT=tglTT||S.set.tglTandaTangan||'';let snapTS=tglSelesai;if(!snapTS){if(S.set.tglSelesai)snapTS=S.set.tglSelesai;else if(snapTT)snapTS=calcSelesaiFromTTD(snapTT);else snapTS=getAutoDates().selesai}const lampRows=$('lampBody').children;const lamp=[];for(const r of lampRows){const mi=r.querySelector('.lj-manual');const ljidxAttr=r.getAttribute('data-ljidx');const selVal_lj=ssVal('lj-'+ljidxAttr);let jenis='';if(selVal_lj==='__manual__')jenis=mi?mi.value.trim():'';else if(selVal_lj)jenis=selVal_lj.trim();const jml=Number(r.querySelector('.lr').value)||0;const ni=r.querySelector('.ln');const nStr=ni?ni.value.replace(/[^\d-]/g,''):'';const npr=Number(nStr)||0;lamp.push({jenis,jumlah:jml,nilaiPerRD:npr})}const totalHonor=lamp.reduce((s,l)=>s+l.jumlah*l.nilaiPerRD,0);if(totalHonor>S.set.honorMaks)return toast('Total honor melebihi batas maksimal','warning');if(editId){const idx=S.mitra.findIndex(x=>x.id===editId);if(idx>-1){S.mitra[idx]={...S.mitra[idx],nama,nik,alamat,noTelepon:tl,tglTandaTangan:snapTT,tglSelesai:snapTS,lampiran:lamp,totalHonor,updatedAt:new Date().toISOString()}}toast('Data mitra diperbarui (nomor kontrak tetap: '+S.mitra.find(x=>x.id===editId)?.nomorKontrak+')')}else{const preview=getNomorPreview(snapTT,'');if(preview.isDup){toast('Duplikat! Nomor '+preview.nomor+' sudah dipakai oleh "'+preview.conflictWith+'".','error');return}S.mitra.push({id:gid(),nomorKontrak:preview.nomor,nama,nik,alamat,noTelepon:tl,tglTandaTangan:snapTT,tglSelesai:snapTS,lampiran:lamp,totalHonor,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});toast('Mitra berhasil ditambahkan dengan nomor '+preview.nomor)}aSave();cM();render()}
